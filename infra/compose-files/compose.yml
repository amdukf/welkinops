version: '3'

services:
  mkdocs:
    image: amirmkh/welkinops:latest
    container_name: welkinops-docs
    restart: unless-stopped
    ports:
      - "127.0.0.1:8006:80"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.scope=welkinops"
  watchtower:
    image: nickfedor/watchtower:1.17.0
    container_name: watchtower-A
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json
    command:
      - --label-enable
      - --scope=welkinops
      - --cleanup
      - --interval=15
    labels:
      - "com.centurylinklabs.watchtower.scope=welkinops"
