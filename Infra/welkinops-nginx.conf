server {
    listen 443 ssl;
    server_name server_name;

    ssl_certificate /opt/certs/fullchain1.pem;
    ssl_certificate_key /opt/certs/privkey1.pem;
    more_set_headers "Server: Microsoft-IIS/10.0";
    auth_basic "Restricted Area";
    auth_basic_user_file /etc/nginx/.htpasswddocs;

    location / {
        proxy_pass http://127.0.0.1:8006;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Scheme $scheme;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /logout {
        return 302 https://server_name/oauth2/sign_out;
    }
}

server {
    listen 80;
    server_name server_name;
    return 301 https://$host$request_uri;
    more_set_headers "Server: Microsoft-IIS/10.0";
}