name: Build and Publish MkDocs Docker Image for Gitea

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repo manually
        run: |
          git clone http://${{ secrets.GIT_USERNAME }}:${{ secrets.GIT_TOKEN }}@${{ secrets.REGISTRY_URL }}/amdukf/welkinops.git .
      
      - name: Login to registry
        run: |
          echo "${{ secrets.REGISTRY_TOKEN }}" | docker login \
            ${{ secrets.REGISTRY_URL }} \
            -u ${{ secrets.REGISTRY_USERNAME }} \
            --password-stdin

      - name: Build image
        run: |
          docker build -t ${{ secrets.REGISTRY_URL }}/amirmkh/welkinops:latest .

      - name: Push image
        run: |
          docker push ${{ secrets.REGISTRY_URL }}/amirmkh/welkinops:latest
