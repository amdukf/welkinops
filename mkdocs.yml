site_name: Welkinops Docs

repo_name: amdukf/welkinops
repo_url: https://github.com/amdukf/welkinops
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo.png
  font:
    text: Roboto

  features:
    - navigation.indexes
    - navigation.path
    - navigation.tabs
    - navigation.top
    - content.code.copy
    - navigation.footer
    - content.action.edit
    - content.action.view
  palette:
    - scheme: default
      toggle:
        icon: material/lightbulb
        name: Switch to dark mode
    - scheme: slate
      primary: black
      toggle:
        icon: material/lightbulb-outline
        name: Switch to light mode

plugins:
  - search
  - git-revision-date-localized

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/amdukf
    - icon: fontawesome/solid/envelope
      link: mailto:amir.kheirandish.k@gmail.com
    - icon: fontawesome/brands/linkedin
      link: http://www.linkedin.com/in/amirkheirandish

copyright: >
  © 2026 Welkinops. All rights reserved.

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.emoji
