site_name: Welkinops Docs

theme:
  name: material
  logo: assets/logo.png
  extra_css:
    - assests/extra.css
  favicon: assests/logo.png

  features:
    - navigation.indexes
    - navigation.path
    - navigation.tabs
    - navigation.top
    - content.code.copy
  palette:
    - scheme: default
      toggle:
        icon: material/lightbulb
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/lightbulb-outline
        name: Switch to light mode

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.emoji
